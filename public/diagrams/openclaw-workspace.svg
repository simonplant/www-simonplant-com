<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" font-family="'JetBrains Mono', 'SF Mono', Consolas, monospace" font-size="12">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#d4a853"/>
    </marker>
    <marker id="arrow-down" markerWidth="6" markerHeight="8" refX="3" refY="8" orient="auto">
      <path d="M0,0 L3,8 L6,0" fill="#d4a853"/>
    </marker>
  </defs>

  <style>
    .title { font-size: 16px; font-weight: bold; fill: #e8e4d9; }
    .subtitle { font-size: 11px; fill: #888; }
    .file-name { font-size: 12px; fill: #d4a853; font-weight: bold; }
    .file-desc { font-size: 10px; fill: #999; }
    .file-detail { font-size: 9px; fill: #666; }
    .section-label { font-size: 10px; fill: #d4a853; font-weight: bold; letter-spacing: 1px; }
    .priority { font-size: 9px; fill: #555; font-weight: bold; }
    .annotation { font-size: 10px; fill: #777; font-style: italic; }
    .warning { font-size: 10px; fill: #c44; }
    .prompt-section { font-size: 10px; fill: #ccc; }
    .prompt-num { font-size: 9px; fill: #d4a853; }
  </style>

  <!-- Background -->
  <rect width="900" height="700" fill="#0a0a0f" rx="8"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" class="title">The 8 Auto-Loaded Files + System Prompt Assembly</text>
  <text x="450" y="48" text-anchor="middle" class="subtitle">These 8 filenames are the only files injected into context at session start. Everything else is invisible.</text>

  <!-- Left column: The 8 files -->
  <text x="220" y="78" text-anchor="middle" class="section-label">~/.openclaw/workspace/</text>

  <!-- SOUL.md -->
  <rect x="30" y="92" width="380" height="54" rx="5" fill="#1c1c10" stroke="#d4a853" stroke-width="1.2"/>
  <text x="46" y="112" class="file-name">SOUL.md</text>
  <text x="46" y="126" class="file-desc">Character, tone, values, hard behavioral limits</text>
  <text x="46" y="138" class="file-detail">chmod 444 recommended  ·  50-150 lines  ·  the most important file</text>
  <text x="390" y="112" text-anchor="end" class="priority">P10</text>

  <!-- IDENTITY.md -->
  <rect x="30" y="154" width="380" height="44" rx="5" fill="#1a1a2e" stroke="#333" stroke-width="1"/>
  <text x="46" y="174" class="file-name">IDENTITY.md</text>
  <text x="46" y="188" class="file-desc">Name, emoji, avatar — metadata, not personality</text>
  <text x="390" y="174" text-anchor="end" class="priority">P20</text>

  <!-- AGENTS.md -->
  <rect x="30" y="206" width="380" height="54" rx="5" fill="#1c1c10" stroke="#d4a853" stroke-width="1.2"/>
  <text x="46" y="226" class="file-name">AGENTS.md</text>
  <text x="46" y="240" class="file-desc">SOPs, workflow rules, memory management, safety gates</text>
  <text x="46" y="252" class="file-detail">Typically the largest file  ·  routes to checklists/</text>
  <text x="390" y="226" text-anchor="end" class="priority">P30</text>

  <!-- USER.md -->
  <rect x="30" y="268" width="380" height="44" rx="5" fill="#1a1a2e" stroke="#555" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="46" y="288" class="file-name">USER.md</text>
  <text x="46" y="302" class="file-desc">Human context: name, timezone, preferences, role</text>
  <text x="390" y="288" text-anchor="end" class="priority">P40</text>
  <text x="390" y="302" text-anchor="end" class="file-detail">main session only</text>

  <!-- TOOLS.md -->
  <rect x="30" y="320" width="380" height="44" rx="5" fill="#1a1a2e" stroke="#333" stroke-width="1"/>
  <text x="46" y="340" class="file-name">TOOLS.md</text>
  <text x="46" y="354" class="file-desc">Environment notes: SSH hosts, TTS voices, device IDs</text>
  <text x="390" y="340" text-anchor="end" class="priority">P50</text>

  <!-- BOOTSTRAP.md -->
  <rect x="30" y="372" width="380" height="44" rx="5" fill="#1a1a2e" stroke="#333" stroke-width="1"/>
  <text x="46" y="392" class="file-name">BOOTSTRAP.md</text>
  <text x="46" y="406" class="file-desc">First-run onboarding — delete after setup</text>
  <text x="390" y="392" text-anchor="end" class="priority">P60</text>

  <!-- MEMORY.md -->
  <rect x="30" y="424" width="380" height="54" rx="5" fill="#1a1a2e" stroke="#555" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="46" y="444" class="file-name">MEMORY.md</text>
  <text x="46" y="458" class="file-desc">Curated long-term facts, preferences, lessons</text>
  <text x="46" y="470" class="file-detail">Persists across months  ·  keep it short</text>
  <text x="390" y="444" text-anchor="end" class="priority">P70</text>
  <text x="390" y="458" text-anchor="end" class="file-detail">main session only</text>

  <!-- HEARTBEAT.md -->
  <rect x="30" y="486" width="380" height="54" rx="5" fill="#1a1a2e" stroke="#333" stroke-width="1"/>
  <text x="46" y="506" class="file-name">HEARTBEAT.md</text>
  <text x="46" y="520" class="file-desc">Autonomous check-in checklist (every 30min default)</text>
  <text x="46" y="532" class="file-detail">Empty file = skip heartbeat  ·  dynamic context (post-cache)</text>

  <!-- Dashed-line legend -->
  <line x1="30" y1="558" x2="56" y2="558" stroke="#555" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="62" y="562" class="file-detail">= main/private session only (never group chats)</text>

  <!-- Warning -->
  <rect x="30" y="576" width="380" height="40" rx="4" fill="#1a0a0a" stroke="#633" stroke-width="1"/>
  <text x="220" y="593" text-anchor="middle" class="warning">Any other filename is invisible after compaction.</text>
  <text x="220" y="607" text-anchor="middle" class="file-detail">notes.md, knowledge-base.md, health-profile.md — the agent can't see them.</text>

  <!-- Truncation limits -->
  <rect x="30" y="624" width="380" height="44" rx="4" fill="#121218" stroke="#333" stroke-width="1"/>
  <text x="220" y="641" text-anchor="middle" class="file-desc">Per-file: 20,000 chars  ·  Aggregate: 150,000 chars</text>
  <text x="220" y="655" text-anchor="middle" class="file-detail">150K chars ~ 50K tokens  ·  silently truncated if exceeded  ·  /context list to check</text>

  <!-- Right column: System Prompt Assembly -->
  <text x="660" y="78" text-anchor="middle" class="section-label">SYSTEM PROMPT ASSEMBLY ORDER</text>
  <text x="660" y="91" text-anchor="middle" class="file-detail">src/agents/system-prompt.ts  ·  ~43KB</text>

  <!-- Prompt sections -->
  <rect x="470" y="102" width="400" height="564" rx="5" fill="#0f0f1a" stroke="#333" stroke-width="1"/>

  <!-- Static sections above cache boundary -->
  <text x="486" y="124" class="prompt-num">1.</text>
  <text x="502" y="124" class="prompt-section">Identity line</text>
  <text x="850" y="124" text-anchor="end" class="file-detail">"You are a personal assistant..."</text>

  <text x="486" y="144" class="prompt-num">2.</text>
  <text x="502" y="144" class="prompt-section">Available tools</text>
  <text x="850" y="144" text-anchor="end" class="file-detail">47+ tools, one-line summaries</text>

  <text x="486" y="164" class="prompt-num">3.</text>
  <text x="502" y="164" class="prompt-section">Interaction style</text>
  <text x="850" y="164" text-anchor="end" class="file-detail">overridable per provider</text>

  <text x="486" y="184" class="prompt-num">4.</text>
  <text x="502" y="184" class="prompt-section">Tool call style</text>
  <text x="850" y="184" text-anchor="end" class="file-detail">"don't narrate routine calls"</text>

  <text x="486" y="204" class="prompt-num">5.</text>
  <text x="502" y="204" class="prompt-section">Execution bias</text>
  <text x="850" y="204" text-anchor="end" class="file-detail">"start doing it in the same turn"</text>

  <text x="486" y="224" class="prompt-num">6.</text>
  <text x="502" y="224" class="prompt-section">Provider stable prefix</text>
  <text x="850" y="224" text-anchor="end" class="file-detail">above cache boundary</text>

  <text x="486" y="244" class="prompt-num">7.</text>
  <text x="502" y="244" class="prompt-section">Safety rules</text>
  <text x="850" y="244" text-anchor="end" class="file-detail">anti-power-seeking, oversight</text>

  <text x="486" y="264" class="prompt-num">8.</text>
  <text x="502" y="264" class="prompt-section">CLI quick reference</text>

  <text x="486" y="284" class="prompt-num">9.</text>
  <text x="502" y="284" class="prompt-section">Skills</text>
  <text x="850" y="284" text-anchor="end" class="file-detail">XML-formatted, tool-gated</text>

  <text x="486" y="304" class="prompt-num">10.</text>
  <text x="506" y="304" class="prompt-section">Memory instructions</text>
  <text x="850" y="304" text-anchor="end" class="file-detail">when memory search enabled</text>

  <text x="486" y="324" class="prompt-num">11.</text>
  <text x="506" y="324" class="prompt-section">Model aliases</text>

  <text x="486" y="344" class="prompt-num">12.</text>
  <text x="506" y="344" class="prompt-section">Workspace path + sandbox details</text>

  <!-- Bootstrap files section (highlighted) -->
  <rect x="480" y="358" width="380" height="154" rx="3" fill="#1c1c10" stroke="#d4a853" stroke-width="0.8" stroke-opacity="0.4"/>

  <text x="670" y="376" text-anchor="middle" class="section-label">WORKSPACE FILES INJECTED HERE</text>

  <text x="496" y="396" class="prompt-num">13.</text>
  <text x="516" y="396" class="file-name" font-size="11">SOUL.md</text>
  <text x="850" y="396" text-anchor="end" class="file-detail">priority 10 — loaded first</text>

  <text x="496" y="416" class="prompt-num">14.</text>
  <text x="516" y="416" class="file-name" font-size="11">IDENTITY.md</text>
  <text x="850" y="416" text-anchor="end" class="file-detail">priority 20</text>

  <text x="496" y="436" class="prompt-num">15.</text>
  <text x="516" y="436" class="file-name" font-size="11">AGENTS.md</text>
  <text x="850" y="436" text-anchor="end" class="file-detail">priority 30</text>

  <text x="496" y="456" class="prompt-num">16.</text>
  <text x="516" y="456" class="file-name" font-size="11">USER.md  ·  TOOLS.md  ·  BOOTSTRAP.md</text>
  <text x="850" y="456" text-anchor="end" class="file-detail">P40 · P50 · P60</text>

  <text x="496" y="476" class="prompt-num">17.</text>
  <text x="516" y="476" class="file-name" font-size="11">MEMORY.md</text>
  <text x="850" y="476" text-anchor="end" class="file-detail">priority 70 — loaded last</text>

  <text x="496" y="500" class="annotation">large files truncated at bootstrapMaxChars</text>

  <!-- Cache boundary -->
  <line x1="480" y1="520" x2="860" y2="520" stroke="#d4a853" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="670" y="536" text-anchor="middle" class="section-label">PROMPT CACHE BOUNDARY</text>
  <text x="670" y="548" text-anchor="middle" class="file-detail">everything below invalidates cache on change</text>

  <!-- Dynamic sections below cache boundary -->
  <text x="486" y="570" class="prompt-num">18.</text>
  <text x="506" y="570" class="prompt-section">HEARTBEAT.md</text>
  <text x="850" y="570" text-anchor="end" class="file-detail">dynamic — changes each tick</text>

  <text x="486" y="590" class="prompt-num">19.</text>
  <text x="506" y="590" class="prompt-section">Group chat / subagent context</text>

  <text x="486" y="610" class="prompt-num">20.</text>
  <text x="506" y="610" class="prompt-section">Provider dynamic suffix</text>

  <text x="486" y="630" class="prompt-num">21.</text>
  <text x="506" y="630" class="prompt-section">Runtime summary</text>
  <text x="850" y="630" text-anchor="end" class="file-detail">agent, host, model, channel</text>

  <!-- Prompt modes -->
  <text x="670" y="656" text-anchor="middle" class="file-detail">Modes: full (main) · minimal (subagents) · none (identity only)</text>

  <!-- Connection arrows from files to prompt -->
  <line x1="410" y1="119" x2="470" y2="390" stroke="#d4a853" stroke-width="0.8" stroke-opacity="0.4"/>
  <line x1="410" y1="176" x2="470" y2="410" stroke="#d4a853" stroke-width="0.5" stroke-opacity="0.3"/>
  <line x1="410" y1="233" x2="470" y2="430" stroke="#d4a853" stroke-width="0.8" stroke-opacity="0.4"/>
  <line x1="410" y1="290" x2="470" y2="450" stroke="#d4a853" stroke-width="0.5" stroke-opacity="0.3"/>
  <line x1="410" y1="451" x2="470" y2="470" stroke="#d4a853" stroke-width="0.5" stroke-opacity="0.3"/>
  <line x1="410" y1="513" x2="470" y2="565" stroke="#d4a853" stroke-width="0.5" stroke-opacity="0.3"/>

  <!-- Footer -->
  <text x="450" y="690" text-anchor="middle" class="annotation">The workspace files are the agent. The LLM is rented intelligence. The Gateway is plumbing.</text>
</svg>